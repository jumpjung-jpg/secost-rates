name: 세율 자동 업데이트

on:
  schedule:
    - cron: '0 2 1 1,4,7,10 *'   # 분기 1회: 1월·4월·7월·10월 1일 오전 11시 (KST)
  workflow_dispatch:               # GitHub 웹에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install

      - name: 세율 스크래핑
        run: node scrape.js

      - name: 변경사항 있으면 자동 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet rates.json; then
            echo "변경사항 없음 — 커밋 건너뜀"
          else
            git add rates.json
            git commit -m "세율 자동 업데이트 $(date '+%Y-%m-%d')"
            git push
            echo "✅ rates.json 커밋 및 푸시 완료"
          fi
